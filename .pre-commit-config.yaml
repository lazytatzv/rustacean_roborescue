repos:
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3

  # ruff-pre-commit had a pinned rev that failed to initialize in this environment.
  # Use a local-system ruff hook instead; Nix or CI should provide `ruff` in PATH.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: '\.(c|cpp|cc|h|hpp)$'

      - id: cpplint
        name: cpplint
        entry: cpplint
        language: python
        files: '\.(c|cpp|cc|h|hpp)$'
