repos:
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: '\.(c|cpp|cc|h|hpp)$'

      - id: cpplint
        name: cpplint
        entry: cpplint
        language: python
        additional_dependencies: [cpplint]
        files: '\.(c|cpp|cc|h|hpp)$'
        args:
          - --filter=-legal/copyright,-whitespace/braces,-whitespace/line_length,-whitespace/newline,-build/include_order,-build/include_what_you_use,-build/header_guard,-runtime/int,-readability/todo,-build/namespaces,-build/c++17

      - id: cargo-fmt
        name: cargo fmt (check)
        entry: bash -lc "cd main_ws || true; cargo fmt --all -- --check"
        language: system

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -lc "cd main_ws || true; cargo clippy --workspace -- -D warnings"
        language: system
