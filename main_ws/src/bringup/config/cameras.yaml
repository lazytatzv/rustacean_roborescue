# カメラ設定リスト
# カメラを追加する場合はここにエントリを追加するだけ。
# namespace は "camera_<name>" になる (例: camera_front, camera_arm)
#
# 共通フィールド:
#   name             : カメラ識別名 (namespace に使用)
#   driver           : v4l2 | mjpeg | realsense | theta_s  (デフォルト: v4l2)
#   use_qr           : QR コード検出を有効にするか (デフォルト: false)
#   qr_use_component : QRをカメラと同一プロセスで起動するか (デフォルト: false)
#                      true  → intra-process通信で高パフォーマンス、ただしQRクラッシュでカメラも落ちる
#                      false → 別プロセスで起動、クラッシュ分離
#   image_topic      : QR検出・ffmpegが購読するトピック名 (namespace相対)
#                 v4l2/theta_s → image_raw / realsense → color/image_raw
#
# mjpeg 固有 (MJPEG出力カメラ、USB帯域削減目的、gscam使用):
#   device       : v4l2 デバイスパス
#   width/height : 解像度
#   fps          : フレームレート (caps指定なし、カメラ側デフォルトに任せる)
#   frame_id     : TF フレーム名
#   jpeg_quality : JPEG圧縮品質 1-100 (デフォルト: 65)
#
# v4l2 固有:
#   device       : v4l2 デバイスパス
#   width/height : 解像度
#   fps          : フレームレート
#   frame_id     : TF フレーム名
#   jpeg_quality : JPEG圧縮品質 1-100 (デフォルト: 65)
#
# theta_s 固有 (RICOH THETA S、USB UVC/MJPEGモード):
#   device       : v4l2 デバイスパス
#   width/height : 解像度 (デフォルト: 1280x720)
#   fps          : フレームレート (デフォルト: 15)
#   frame_id     : TF フレーム名
#   jpeg_quality : JPEG圧縮品質 1-100 (デフォルト: 65)
#
# realsense 固有:
#   serial           : シリアル番号 (空文字 = 自動検出)
#   enable_color     : カラーストリーム有効 (デフォルト: true)
#   enable_depth     : 深度ストリーム有効 (デフォルト: false)
#   enable_pose      : T265 ビジュアルオドメトリ有効 (デフォルト: false)
#   enable_accel     : IMU 加速度計有効 (D435i 等、デフォルト: false)
#   enable_gyro      : IMU ジャイロ有効 (D435i 等、デフォルト: false)
#   enable_pointcloud: 点群生成有効 (デフォルト: false、高負荷注意)
#   color_width/color_height/color_fps: カラー解像度
#   depth_width/depth_height/depth_fps: 深度解像度
#
# 注意: serial が空文字の場合、接続された最初のデバイスを使用する。
#       複数の RealSense を同時使用する場合は必ずシリアル番号を指定すること。
#
#
#   v4l2-ctl --list-formats-ext -d /dev/camera_front

cameras:

  # これはテスト！！！！！！！！
  - name: test
    driver: mjpeg
    enabled: false
    device: /dev/video0
    width: 640
    height: 480
    output_encoding: rgb8
    fps: 15
    frame_id: test_camera_link
    use_qr: false
    jpeg_quality: 60

  - name: logi
    driver: mjpeg
    enabled: true
    device: /dev/camera_logitech
    width: 320
    height: 240
    output_encoding: rgb8
    fps: 15
    frame_id: logi_camera_link
    use_qr: false
    jpeg_quality: 60

  # ── v4l2 カメラ (USB 汎用) ────────────────────────────────────────────────

  # アームの先端中のカメラ
  # Genius WideCam F100 (usb-0000:00:14.0-3.4)
  # BUFFALO INC. (formerly MelCo., Inc.) USB 2.0 Camera
  - name: arm
    driver: mjpeg
    enabled: true
    device: /dev/camera_arm # udev bind
    width: 352
    height: 288
    output_encoding: rgb8
    fps: 15
    frame_id: arm_camera_link
    use_qr: false
    jpeg_quality: 60

  # ── MJPEG カメラ (WideCam 2.0、USB帯域削減のため MJPEG 使用) ────────────────
  # YUYV 640x480@30fps ≒ 18 MB/s × 2台 で USB 帯域不足のため MJPEG に変更。
  # v4l2-ctl で MJPEG 対応確認済み。gscam (GStreamer) で取り込む。
  # Genius WideCam 2.0 front_left (usb-0000:00:14.0-3.3)
  # ロボットのバッテリーがある側をFRONTとする
  # front_right と同時起動すると、dma buffer確保で死ぬため同じポートに指してはならない 
  - name: front_left
    driver: mjpeg
    enabled: true
    device: /dev/camera_front_left
    width: 640
    height: 480
    fps: 10
    output_encoding: rgb8
    frame_id: front_left_camera_link
    use_qr: false
    jpeg_quality: 65
    startup_delay: 3.0

  # Genius WideCam 2.0 front_right
  - name: front_right
    driver: mjpeg
    enabled: true
    device: /dev/camera_front_right
    width: 640
    height: 480
    fps: 10
    output_encoding: rgb8
    frame_id: front_right_camera_link
    use_qr: false
    jpeg_quality: 65
    startup_delay: 1.0

  # ── RICOH THETA S (360度カメラ、USB UVC/MJPEGモード) ─────────────────────
  # THETA S は MJPEG のみ出力するため v4l2_camera 非対応。gscam (GStreamer) を使用。
  # GStreamer pipeline: v4l2src ! image/jpeg ! jpegdec ! videoconvert ! video/x-raw,format=RGB
  # fps_numerator/fps_denominator は time_per_frame (1/fps) の分子/分母。
  # GStreamer framerate caps では逆数 (fps_denominator/fps_numerator = 2997/200) を使用。
  - name: theta
    driver: theta_s
    enabled: true
    device: /dev/camera_ricoh
    width: 1280
    height: 720
    fps_numerator: 200    # time_per_frame 分子 (GStreamer framerate = fps_denominator/fps_numerator)
    fps_denominator: 2997 # time_per_frame 分母
    output_encoding: rgb8
    frame_id: theta_camera_link
    use_qr: false
    jpeg_quality: 85  # THETA S は解像度が大きいため少し高めに

  # ── RealSense D435i (RGB-D + IMU) ─────────────────────────────────────────
  # アーム先端横に搭載。深度+カラー+IMU(400Hz)。
  # depth_guard ノードと組み合わせて近接障害物検出に使用する。
  # serial はロボットに取り付けた際に `rs-enumerate-devices` で確認して設定する。
  - name: d435i
    driver: realsense
    enabled: true
    serial: ""
    enable_color: true
    enable_depth: false
    enable_infra1: false
    enable_infra2: false
    enable_accel: false
    enable_gyro: false
    enable_pointcloud: false  # 高負荷。必要時のみ true にする
    color_width: 640
    color_height: 480
    color_fps: 30
    depth_width: 640
    depth_height: 480
    depth_fps: 30
    infra_width: 640
    infra_height: 480
    infra_fps: 15
    use_qr: true
    jpeg_quality: 80
    image_topic: realsense2_camera/color/image_raw

  # ── RealSense T265 (トラッキングカメラ / Visual-Inertial Odometry) ─────────
  # 6DOF ビジュアルオドメトリを /camera_t265/odom/sample に publish する。
  # odom_selector の第3 fallback として利用するには launch_config.yaml の
  # use_t265_odom: true も必要。
  # serial はロボットに取り付けた際に `rs-enumerate-devices` で確認して設定する。
  # これはアーム根元後ろのカメラ
  # 性能は良いが実際使うかは分からない
  - name: t265
    driver: realsense
    enabled: false
    serial: ""
    enable_color: false   # フィッシュアイ映像。通常不要
    enable_depth: false
    enable_pose: true
    use_qr: false
