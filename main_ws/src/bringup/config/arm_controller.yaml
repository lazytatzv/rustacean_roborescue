arm_controller:
  ros__parameters:
    # --- アームの物理定義と計算パラメータ ---
    end_link: "arm6_link"
    watchdog_timeout_ms: 500
    
    # 逆運動学 (IK) のチューニング
    dls_lambda_base: 0.01
    dls_lambda_max: 0.15
    manipulability_threshold: 0.005
    manipulability_lockout: 0.00001
    joint_vel_limit: 1.0
    joint_limit_margin: 0.10
    null_space_repulsion_gain: 0.5
    control_period_ms: 20
