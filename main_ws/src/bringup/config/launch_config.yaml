# ロボット起動設定
# どのサブシステムを有効にするかをここで制御する。
# ros2 launch bringup system.launch.py で読み込まれる。
# 単一高可用構成を優先するため、起動時の細かい切替よりこのファイルを正として運用する。

# 足回り
use_crawler: true
use_flipper: true

use_arm: false

# アームバックエンド選択
# "direct"      : Rust arm_driver で直接 Dynamixel を制御 (デフォルト・軽量)
# "ros2_control": dynamixel_hardware_interface + controller_manager を使用
#                 MoveIt2 / joint_trajectory_controller が利用可能になる
arm_backend: direct

# MoveIt Servo (move_group + servo_node) を起動するか
# arm_backend: ros2_control と組み合わせて使用
# joy_controller の SERVO モード (SHARE 3回押し) と連携
use_moveit: false

# stm32のimuからデータをブリッジする
# imuを使わない場合はfalse
# lidarだけtrueの場合はfast-lioからkiss-icpに自動fallbackする
use_imu: false

# use_slamと同値
# velodyne lidar周辺ノードを立ち上げ、slam_toolboxもする
use_lidar: false

# カメラ制御全て
# これがfalseだと遠隔操縦は不可能
use_camera: true

use_audio: false

# 自動運転
# CAUTION: use_lidarを必ずtrueにすること！
# odom精度の為にuse_imuもtrueのほうが望ましい
use_nav2: false

# T265 トラッキングカメラを /odom の第3 fallback として使用する
# spark_fast_lio → KISS-ICP → T265 の優先順位でフォールバック
# cameras.yaml の t265 エントリも enabled: true にすること
use_t265_odom: false

# D435i 深度カメラを使った近接障害物検出 (depth_guard ノード) を有効にする
# cameras.yaml の d435i エントリも enabled: true にすること
use_depth_guard: false

# QUICのTLS証明書を強制再生成する
# 通常は just gen-cert でコミット済みのcertを使うためfalseのまま
# IPアドレスが変わった場合は true にして一度起動後、false に戻してコミット
quic_regenerate_cert: false
