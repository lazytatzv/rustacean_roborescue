# ロボット起動設定
# どのサブシステムを有効にするかをここで制御する。
# ros2 launch bringup system.launch.py で読み込まれる。
# 単一高可用構成を優先するため、起動時の細かい切替よりこのファイルを正として運用する。

# 足回り
use_crawler: false
use_flipper: false

use_arm: false

# stm32のimuからデータをブリッジする
# imuを使わない場合はfalse
# lidarだけtrueの場合はfast-lioからkiss-icpに自動fallbackする
use_imu: false

# use_slamと同値
# velodyne lidar周辺ノードを立ち上げ、slam_toolboxもする
use_lidar: false

# カメラ制御全て
# これがfalseだと遠隔操縦は不可能
use_camera: true

use_audio: false

# 自動運転
# CAUTION: use_lidarを必ずtrueにすること！
# odom精度の為にuse_imuもtrueのほうが望ましい
use_nav2: false

# T265 トラッキングカメラを /odom の第3 fallback として使用する
# spark_fast_lio → KISS-ICP → T265 の優先順位でフォールバック
# cameras.yaml の t265 エントリも enabled: true にすること
use_t265_odom: false

# D435i 深度カメラを使った近接障害物検出 (depth_guard ノード) を有効にする
# cameras.yaml の d435i エントリも enabled: true にすること
use_depth_guard: false

# jpeg_republish.py による常時 JPEG 配信を有効にする
# デフォルト (false) は image_transport の compressed transport を使用する。
# ros2 topic list で /camera_XXX/image_raw/compressed が見えない場合に true にする。
use_jpeg_republish: false
