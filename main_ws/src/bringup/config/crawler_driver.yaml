crawler_driver:
  ros__parameters:
    serial_port: "/dev/roboclaw" # ここはudevで名前を縛る必要がある
    baud_rate: 38400 # Roboclaw本体設定に合わせる
    crawler_circumference: 0.39
    counts_per_rev: 256
    gearhead_ratio: 66
    pulley_ratio: 2
    watchdog_timeout_ms: 500
    serial_timeout_ds: 5  # Roboclaw hardware-side command timeout [100ms units]
    track_width: 0.4  # クローラ間距離 [m] (Nav2 cmd_vel → 差動駆動用)
    # Roboclaw PID tuning (要実測チューニング)
    # Kd を 0 から 0.008 に変更: 微分減衰を追加し停止時の振動を抑制する。
    # 動き始め / 停止時の振動が残る場合: Kd を 0.005〜0.015 の範囲で調整。
    # 動きが遅くなる場合: Kp を少し上げるか Kd を下げる。
    m1_kp: 0.464
    m1_ki: 0.021
    m1_kd: 0.008
    m1_qpps: 61000   # M1 max quadrature pulses/sec (0.7m/s approx)
    m2_kp: 0.438
    m2_ki: 0.020
    m2_kd: 0.008
    m2_qpps: 61000   # M2 max quadrature pulses/sec (0.7m/s approx)
    # モーター向き補正: 実機配線や取り付け向き差を吸収 (+1 or -1)
    # ログ上で cmd と actual の符号が逆なら -1 を設定
    m1_direction_sign: -1
    m2_direction_sign: -1
    # エンコーダリセット方針:
    # 初回接続時のみリセットし、再接続時は既定でリセットしない
    reset_encoders_on_connect: true
    reset_encoders_on_reconnect: false

    # ── ハードウェア電流制限 (Roboclaw SETM1/M2MAXCURRENT) ────────────────────
    # Roboclaw が直接カットするので最も確実な保護。0 で無効化。
    # モーターの定格電流を参考に設定すること (要実測)
    m1_max_current_ma: 15000.0   # 15 A (暫定値)
    m2_max_current_ma: 15000.0   # 15 A (暫定値)

    # ── スタック保護 ──────────────────────────────────────────────────────────
    # 指令速度に対して実速度がこの割合以上ずれていたらスタック判定
    stall_error_ratio: 0.8
    # この qpps 以下の指令は判定しない (停止指令での誤検知防止)
    stall_cmd_threshold_qpps: 500
    # スタックスコアがこの秒数分たまると最大絞りに達する
    stall_window_sec: 2.0
    # スタック時の最大出力削減率 (0.7 = 最大30%削減)
    stall_max_reduction: 0.7

    # ── テレメトリ読み取り周期 ──────────────────────────────────────────────
    telemetry_hz: 10

    # ── デバッグ出力 (切り分け時のみ true 推奨) ─────────────────────────────
    debug_io: true
    debug_log_period_ms: 200
