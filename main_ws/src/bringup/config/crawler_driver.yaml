crawler_driver:
  ros__parameters:
    serial_port: "/dev/roboclaw" # ここはudevで名前を縛る必要がある
    crawler_circumference: 0.39
    counts_per_rev: 256
    gearhead_ratio: 66
    pulley_ratio: 2
    watchdog_timeout_ms: 500
    track_width: 0.4  # クローラ間距離 [m] (Nav2 cmd_vel → 差動駆動用)
    # Roboclaw PID tuning (要実測チューニング)
    m1_kp: 0.464
    m1_ki: 0.021
    m1_kd: 0.0
    m1_qpps: 53250   # M1 max quadrature pulses/sec
    m2_kp: 0.438
    m2_ki: 0.020
    m2_kd: 0.0
    m2_qpps: 50062   # M2 max quadrature pulses/sec

    # ── ハードウェア電流制限 (Roboclaw SETM1/M2MAXCURRENT) ────────────────────
    # Roboclaw が直接カットするので最も確実な保護。0 で無効化。
    # モーターの定格電流を参考に設定すること (要実測)
    m1_max_current_ma: 15000.0   # 15 A (暫定値)
    m2_max_current_ma: 15000.0   # 15 A (暫定値)

    # ── スタック保護 ──────────────────────────────────────────────────────────
    # 指令速度に対して実速度がこの割合以上ずれていたらスタック判定
    stall_error_ratio: 0.5
    # この qpps 以下の指令は判定しない (停止指令での誤検知防止)
    stall_cmd_threshold_qpps: 500
    # スタックスコアがこの秒数分たまると最大絞りに達する
    stall_window_sec: 2.0
    # スタック時の最大出力削減率 (0.5 = 最大50%削減)
    stall_max_reduction: 0.5

    # ── テレメトリ読み取り周期 ──────────────────────────────────────────────
    telemetry_hz: 10
