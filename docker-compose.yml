# このプロジェクトでは基本的にdockerは使わないが、
# nixからイメージを作成し使うニーズの為に一応置いておく
# 他プロジェクトでdocker使う際もこれは最低限必要なので参考にはなりそう

services:
  # Foxglove Studio (Web version)
  # Access via: http://localhost:8080
  foxglove:
    image: ghcr.io/foxglove/studio:latest
    container_name: foxglove_studio
    ports:
      - "8080:8080"
    restart: unless-stopped

  ros2_container:
    image: rustacean-roborescue-env:latest
    container_name: ros2_working_container
    tty: true
    privileged: true
    network_mode: host

    working_dir: /workspace

    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - .:/workspace
      # X11 Forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # もしコンテナ内からホストのDockerコマンドを叩きたいなら
      # - /var/run/docker.sock:/var/run/docker.sock

    # Nixイメージにはエントリーポイントを仕込めるので、
    # 起動時に自動で workspace のビルド済み設定を読ませることも可能

      #xhost +local:docker
      #おまじないは必要
