name: CI (main-heavy)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-checks:
    name: Lint & Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install system C/C++ tooling
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format clang-tidy cppcheck || true

      - name: Byte-compile Python files
        run: |
          set -e
          find . -name "*.py" -not -path "./.git/*" -print0 | xargs -0 -n1 python -m py_compile

      - name: Run ruff
        run: |
          ruff check .

      - name: Run pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Fail if pre-commit made changes
        run: |
          set -e
          if ! git diff --exit-code --quiet; then
            echo "pre-commit made changes. Please run 'pre-commit run --all-files' locally and include the fixes in your commit." >&2
            git --no-pager status --porcelain
            exit 1
          else
            echo "No pre-commit changes detected."
          fi

      - name: Run C++ linters
        run: |
          set -e
          git ls-files '*.c' '*.cpp' '*.cc' '*.h' '*.hpp' | xargs -r cpplint || true
          cppcheck --enable=warning,style,performance --inconclusive --std=c++17 main_ws/src || true

  build-and-test:
    name: Nix Build + Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    needs: lint-and-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          curl -L https://nixos.org/nix/install | sh -s -- --no-daemon
          . $HOME/.nix-profile/etc/profile.d/nix.sh

      - name: Optional: configure Cachix (if available)
        if: ${{ secrets.CACHIX_AUTH != '' }}
        run: |
          curl -sL https://cachix.org/install.sh | sh
          cachix authtoken ${{ secrets.CACHIX_AUTH }}
          cachix use rustacean-roborescue || true

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            main_ws/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pip and pytest caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pytest
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Nix & dev-shell artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            ~/.nix-profile
            ~/.local/share/nix
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.nix') }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-

      - name: Cache colcon build artifacts
        uses: actions/cache@v4
        with:
          path: |
            main_ws/build
            main_ws/install
          key: ${{ runner.os }}-colcon-${{ hashFiles('**/package.xml') }}-${{ hashFiles('**/CMakeLists.txt') }}-${{ hashFiles('flake.nix') }}
          restore-keys: |
            ${{ runner.os }}-colcon-

      - name: Show Nix and environment
        run: |
          . $HOME/.nix-profile/etc/profile.d/nix.sh
          nix --version
          uname -a

      - name: Enter Nix dev shell and run build + tests
        env:
          RUST_BACKTRACE: 1
        run: |
          . $HOME/.nix-profile/etc/profile.d/nix.sh
          nix develop --accept-flake-config --command bash -lc '
            set -euo pipefail
            echo "Running colcon build (selected packages)..."
            cd main_ws
            colcon build --packages-select h264_republisher --merge-install || true

            echo "Run cargo unit tests for arm_controller (pure Rust tests)..."
            cd src/control/arm_controller
            cargo test --verbose || true

            echo "Run Python integration tests (if any)"
            cd ../../..
            if [ -f test_arm_controller.py ]; then
              python3 -m pytest -q test_arm_controller.py || true
            fi
          '

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            main_ws/build
            main_ws/log

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    needs: [lint-and-checks]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cargo registry and target (Rust job)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            main_ws/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v4

      - name: Build ROS 2 message bindings
        run: |
          nix develop --impure -c bash -c "
            cd main_ws
            colcon build --merge-install --symlink-install \
              --packages-up-to rosidl_generator_rs \
              --cmake-args -DROSIDL_GENERATOR_RUST=ON -G Ninja \
              2>&1 | grep -v 'local_setup' || true
            source install/setup.bash
            colcon build --merge-install --symlink-install \
              --packages-select custom_interfaces \
              --cmake-args -DROSIDL_GENERATOR_RUST=ON -G Ninja \
              2>&1 | grep -v 'local_setup' || true
          "

      - name: cargo fmt --check
        run: |
          nix develop --impure -c bash -c "
            cd main_ws && cargo fmt --all -- --check
          "

      - name: cargo clippy
        run: |
          nix develop --impure -c bash -c "
            cd main_ws && source install/setup.bash && \
            cargo clippy --workspace -- -D warnings
          "

      - name: cargo test
        run: |
          nix develop --impure -c bash -c "
            cd main_ws && source install/setup.bash && \
            cargo test --workspace
          "

  cpp:
    name: C++ (colcon build)
    runs-on: ubuntu-latest
    needs: [lint-and-checks]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache colcon build/install (C++ job)
        uses: actions/cache@v4
        with:
          path: |
            main_ws/build
            main_ws/install
          key: ${{ runner.os }}-colcon-${{ hashFiles('**/package.xml') }}-${{ hashFiles('**/CMakeLists.txt') }}-${{ hashFiles('flake.nix') }}
          restore-keys: |
            ${{ runner.os }}-colcon-

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v4

      - name: colcon build (C++ packages)
        run: |
          nix develop --impure -c bash -c "
            cd main_ws
            colcon build --merge-install --symlink-install \
              --cmake-args -DROSIDL_GENERATOR_RUST=ON -G Ninja \
              --packages-ignore kiss_icp \
              2>&1 | grep -v 'local_setup' || true
          "

  coverage:
    name: Coverage and upload
    runs-on: ubuntu-22.04
    needs: [build-and-test, rust, cpp]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Python coverage (pytest)
        run: |
          set -e
          if [ -f main_ws/test_all_functions.py ]; then
            python -m pytest --cov=main_ws --cov-report=xml:coverage-python.xml -q || true
          else
            echo "No python tests found; skipping"
          fi

      - name: Install cargo-tarpaulin
        run: |
          set -e
          cargo install cargo-tarpaulin || true

      - name: Run Rust coverage (tarpaulin)
        run: |
          set -e
          if [ -f main_ws/Cargo.toml ] || [ -f Cargo.toml ]; then
            . $HOME/.nix-profile/etc/profile.d/nix.sh || true
            nix develop --impure -c bash -lc '
              set -euo pipefail
              cd main_ws || true
              cargo tarpaulin --workspace --out Xml || true
            '
          else
            echo "No Rust workspace found; skipping tarpaulin"
          fi

      - name: Upload coverage to Codecov
        if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            coverage-python.xml
            tarpaulin-report.xml
          flags: unittests
          fail_ci_if_error: false
