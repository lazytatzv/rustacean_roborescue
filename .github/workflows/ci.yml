name: CI

# Nixを用いたビルドチェック等

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同じブランチへの連続 push は古いランをキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────────────────────
# Job graph:
#
#   lint ──┬── rust ──┐
#           └── cpp  ──┴── coverage
#
# lint が通らないとビルド・テストは走らない。
# rust と cpp は並列実行でフィードバックを最速にする。
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      # GithubのVariableに登録してある
      # CachixのAuth tokenはサイトで生成
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Nix インストールは DeterminateSystems で統一
      - uses: DeterminateSystems/nix-installer-action@v22


      # Cachix: チーム専用の永続バイナリキャッシュ
      # CACHIX_AUTH_TOKEN を repo secrets に設定すること
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Run pre-commit (全ファイル)
        run: |
          # cargo-fmt / cargo-clippy は rust job で別途チェックするためスキップ
          SKIP=cargo-fmt,cargo-clippy \
          nix develop .#precommit --fallback --accept-flake-config --command \
            pre-commit run --all-files --show-diff-on-failure

      - name: pre-commit による変更がないか確認
        run: git diff --exit-code

  # ───────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 60
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Cargo レジストリ + target ディレクトリをキャッシュ。
      # flake.lock を key に含めることで Rust toolchain 更新時に自動破棄される。
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            main_ws/target
          key: cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            cargo-${{ runner.os }}-

      # just forge に相当するビルド
      - name: forge (Build all packages)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws

            # 1. 環境変数のセットアップ
            export COLCON_ROS_SKIP_INSTALL_CHECK=1
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export CARGO_BUILD_RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"

            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            gen_cmake=\"\$install_dir/share/rosidl_generator_rs/cmake\"
            # Nix環境特有の警告を抑制
            filter_cmd=\"grep -v 'doesn.t contain any .local_setup... files' || true\"

            # 2. ジェネレーター単体をビルド (forge-bindings相当)
            colcon build \
              --packages-up-to rosidl_generator_rs \
              --merge-install --symlink-install \
              --cmake-args -G Ninja -DBUILD_TESTING=OFF

            # 3. 依存パスを強制エクスポートした状態で全体をビルド (forge相当)
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"

            colcon build \
              --merge-install --symlink-install \
              --event-handlers console_cohesion+ \
              --cmake-args \
                -DROSIDL_GENERATOR_RUST=ON \
                -Drosidl_generator_rs_DIR=\"\$gen_cmake\" \
                -DBUILD_TESTING=OFF \
                -G Ninja \
              --packages-ignore kiss_icp h264_republisher vision_processor

          "

      - name: Upload build logs (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs-rust
          path: main_ws/log

      - name: cargo fmt --check
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws && cargo fmt --all -- --check
          "

      - name: cargo clippy (warnings = errors)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws
            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"
            cargo clippy --workspace -- -D warnings
          "

      - name: cargo test
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws
            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"
            cargo test --workspace
          "

      - name: cargo audit (セキュリティ脆弱性チェック)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws && cargo audit
          "

  # ───────────────────────────────────────────────────────────────────────────
  cpp:
    name: C++
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 60
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # ccache + colcon ビルド成果物をキャッシュ。
      # flake.lock を key に含めることで ROS パッケージ更新時に自動破棄される。
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            main_ws/build
            main_ws/install
          key: colcon-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('**/package.xml') }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            colcon-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            colcon-${{ runner.os }}-

      # just forge に完全一致するビルド
      - name: forge (just forge 相当)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws

            # 1. 環境変数のセットアップ
            export COLCON_ROS_SKIP_INSTALL_CHECK=1
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export CARGO_BUILD_RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"

            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            gen_cmake=\"\$install_dir/share/rosidl_generator_rs/cmake\"
            # Nix環境特有の警告を抑制
            filter_cmd=\"grep -v 'doesn.t contain any .local_setup... files' || true\"

            # 2. ジェネレーター単体をビルド (forge-bindings相当)
            colcon build \
              --packages-up-to rosidl_generator_rs \
              --merge-install --symlink-install \
              --cmake-args -G Ninja -DBUILD_TESTING=OFF

            # 3. 依存パスを強制エクスポートした状態で全体をビルド (forge相当)
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"

            colcon build \
              --merge-install --symlink-install \
              --cmake-args \
                -DROSIDL_GENERATOR_RUST=ON \
                -Drosidl_generator_rs_DIR=\"\$gen_cmake\" \
                -DBUILD_TESTING=OFF \
                -G Ninja \
              --packages-ignore kiss_icp h264_republisher vision_processor

          "

      - name: Upload build logs (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs
          path: main_ws/log

  # ───────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 60
    needs: [rust, cpp]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            main_ws/target
          key: cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            cargo-${{ runner.os }}-

      - name: forge (Build all packages)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws

            # 1. 環境変数のセットアップ
            export COLCON_ROS_SKIP_INSTALL_CHECK=1
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export CARGO_BUILD_RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"

            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            gen_cmake=\"\$install_dir/share/rosidl_generator_rs/cmake\"
            # Nix環境特有の警告を抑制
            filter_cmd=\"grep -v 'doesn.t contain any .local_setup... files' || true\"

            # 2. ジェネレーター単体をビルド (forge-bindings相当)
            colcon build \
              --packages-up-to rosidl_generator_rs \
              --merge-install --symlink-install \
              --cmake-args -G Ninja -DBUILD_TESTING=OFF

            # 3. 依存パスを強制エクスポートした状態で全体をビルド (forge相当)
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"

            colcon build \
              --merge-install --symlink-install \
              --cmake-args \
                -DROSIDL_GENERATOR_RUST=ON \
                -Drosidl_generator_rs_DIR=\"\$gen_cmake\" \
                -DBUILD_TESTING=OFF \
                -G Ninja \
              --packages-ignore kiss_icp h264_republisher vision_processor

          "

      - name: Rust カバレッジ (tarpaulin)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws
            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"
            cargo tarpaulin --workspace --out Xml --output-file tarpaulin-report.xml
          "

      - name: Codecov へアップロード
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: main_ws/tarpaulin-report.xml
          fail_ci_if_error: false
