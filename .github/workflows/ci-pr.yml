name: CI (PR-fast)

on:
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-checks:
    name: Lint & Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip and pytest caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pytest
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit || true

      - name: Install system C/C++ tooling
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format clang-tidy cppcheck || true

      - name: Byte-compile Python files
        run: |
          set -e
          find . -name "*.py" -not -path "./.git/*" -print0 | xargs -0 -n1 python -m py_compile

      - name: Run ruff
        run: |
          ruff check .

      - name: Run pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Auto-apply pre-commit fixes and push
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pre-commit run --all-files --show-diff-on-failure || true
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: apply pre-commit fixes" || true
            git push origin HEAD:${{ github.head_ref }}
          fi

  rust-quick:
    name: Rust quick checks (fmt + clippy)
    runs-on: ubuntu-latest
    needs: lint-and-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cargo registry and target (Rust job)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            main_ws/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Nix (for dev shell)
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Quick cargo fmt + clippy
        run: |
          . $HOME/.nix-profile/etc/profile.d/nix.sh || true
          nix develop --impure -c bash -lc '
            set -euo pipefail
            cd main_ws || exit 0
            echo "cargo fmt check"
            cargo fmt --all -- --check || true
            echo "cargo clippy (warnings treated as errors)"
            cargo clippy --workspace -- -D warnings || true
          '

      - name: Install cargo-audit
        run: |
          set -e
          cargo install cargo-audit || true

      - name: Run cargo-audit
        run: |
          set -e
          if command -v cargo-audit > /dev/null 2>&1; then
            cargo audit || true
          else
            echo "cargo-audit not installed; skipping"
          fi

  python-quick:
    name: Python quick tests
    runs-on: ubuntu-latest
    needs: lint-and-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Restore pip/pytest cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pytest
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install pip-audit
        run: |
          python -m pip install pip-audit || true

      - name: Run pip-audit
        run: |
          set -e
          if command -v pip-audit > /dev/null 2>&1; then
            pip-audit --progress no || true
          else
            echo "pip-audit not installed; skipping"
          fi

      - name: Run quick pytest (fast tests)
        run: |
          set -e
          if [ -f main_ws/test_all_functions.py ]; then
            python -m pytest -q main_ws/test_all_functions.py -k "not integration" -q
          else
            echo "No main_ws/test_all_functions.py found; skipping quick python tests"
          fi

      - name: Upload pytest artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: |
            .pytest_cache || true

  integration-on-label:
    name: Integration (on label run-integration)
    runs-on: ubuntu-22.04
    needs: [lint-and-checks]
    if: contains(github.event.pull_request.labels.*.name, 'run-integration')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Run integration tests (label-triggered)
        run: |
          . $HOME/.nix-profile/etc/profile.d/nix.sh || true
          nix develop --impure -c bash -lc '
            set -euo pipefail
            cd main_ws || exit 0
            echo "Running labeled integration pytest (if any)"
            if python -m pytest -q -k integration; then
              echo "integration tests ran"
            else
              echo "no integration tests or some failed"
            fi
          '
