name: CI (PR)

on:
  pull_request:
    branches: [main]

# 同じ PR への連続 push は古いランをキャンセルする
concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────────────────────
# Job graph:
#
#   lint ──┬── rust-check ──┐
#           └── cpp         ──┴── (integration: label-triggered)
#
# PR では cargo test を省略し fmt + clippy のみで高速フィードバックを返す。
# フル integration テストは `run-integration` ラベルで手動トリガー。
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 20
    permissions:
      contents: write  # pre-commit 自動修正 push に必要
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: true

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Run pre-commit
        id: precommit
        run: |
          # cargo-fmt / cargo-clippy は rust-check job で別途チェックするためスキップ
          SKIP=cargo-fmt,cargo-clippy \
          nix develop .#precommit --fallback --accept-flake-config --command \
            pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true

      # fork からの PR は push 権限がないので自動修正はスキップ
      - name: pre-commit の修正を自動コミット & push (fork 以外)
        if: |
          steps.precommit.outcome == 'failure' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "ci: apply pre-commit fixes [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: pre-commit 失敗を確定させる
        if: steps.precommit.outcome == 'failure'
        run: |
          echo "pre-commit が失敗しました。ローカルで 'pre-commit run --all-files' を実行してください。"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  rust-check:
    name: Rust (fmt + clippy)
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 40
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # fork PR は書き込み権限なし → read-only で使う
          skipPush: ${{ github.event.pull_request.head.repo.full_name != github.repository }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            main_ws/target
          key: cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            cargo-${{ runner.os }}-

      # just forge に相当するビルド
      - name: forge (Build all packages)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws

            # 1. 環境変数のセットアップ
            export COLCON_ROS_SKIP_INSTALL_CHECK=1
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export CARGO_BUILD_RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"

            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            gen_cmake=\"\$install_dir/share/rosidl_generator_rs/cmake\"
            # Nix環境特有の警告を抑制
            filter_cmd=\"grep -v 'doesn.t contain any .local_setup... files' || true\"

            # 2. ジェネレーター単体をビルド (forge-bindings相当)
            colcon build \
              --packages-up-to rosidl_generator_rs \
              --merge-install --symlink-install \
              --cmake-args -G Ninja -DBUILD_TESTING=OFF

            # 3. 依存パスを強制エクスポートした状態で全体をビルド (forge相当)
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"

            colcon build \
              --merge-install --symlink-install \
              --cmake-args \
                -DROSIDL_GENERATOR_RUST=ON \
                -Drosidl_generator_rs_DIR=\"\$gen_cmake\" \
                -DBUILD_TESTING=OFF \
                -G Ninja \
              --packages-ignore kiss_icp h264_republisher vision_processor

          "

      - name: cargo fmt --check
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws && cargo fmt --all -- --check
          "

      - name: cargo clippy (warnings = errors)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws
            source install/setup.bash
            # rosidl_generator_rs のパスを明示的に追加
            export PATH=\"\$(pwd)/install/lib/rosidl_generator_rs:\$PATH\"
            cargo clippy --workspace -- -D warnings
          "

  # ───────────────────────────────────────────────────────────────────────────
  cpp:
    name: C++
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 60
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event.pull_request.head.repo.full_name != github.repository }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            main_ws/build
            main_ws/install
          key: colcon-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('**/package.xml') }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            colcon-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            colcon-${{ runner.os }}-

      # just forge に完全一致するビルド
      - name: forge (just forge 相当)
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws

            # 1. 環境変数のセットアップ
            export COLCON_ROS_SKIP_INSTALL_CHECK=1
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export CARGO_BUILD_RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"

            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            gen_cmake=\"\$install_dir/share/rosidl_generator_rs/cmake\"
            # Nix環境特有の警告を抑制
            filter_cmd=\"grep -v 'doesn.t contain any .local_setup... files' || true\"

            # 2. ジェネレーター単体をビルド (forge-bindings相当)
            colcon build \
              --packages-up-to rosidl_generator_rs \
              --merge-install --symlink-install \
              --cmake-args -G Ninja -DBUILD_TESTING=OFF

            # 3. 依存パスを強制エクスポートした状態で全体をビルド (forge相当)
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"

            colcon build \
              --merge-install --symlink-install \
              --cmake-args \
                -DROSIDL_GENERATOR_RUST=ON \
                -Drosidl_generator_rs_DIR=\"\$gen_cmake\" \
                -DBUILD_TESTING=OFF \
                -G Ninja \
              --packages-ignore kiss_icp h264_republisher vision_processor

          "

      - name: Upload build logs (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs-pr
          path: main_ws/log

  # ───────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    timeout-minutes: 60
    needs: [rust-check, cpp]
    # `run-integration` ラベルが付いた PR のみ実行
    if: contains(github.event.pull_request.labels.*.name, 'run-integration')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v14
        if: env.CACHIX_AUTH_TOKEN != ''
        continue-on-error: true
        with:
          name: roborescue-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            main_ws/target
          key: cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            cargo-${{ runner.os }}-

      - name: forge + cargo test
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws

            # 1. 環境変数のセットアップ
            export COLCON_ROS_SKIP_INSTALL_CHECK=1
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang
            export CARGO_BUILD_RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"

            install_dir=\$(pwd)/install
            py_path=\"\$install_dir/lib/python3.12/site-packages\"
            gen_cmake=\"\$install_dir/share/rosidl_generator_rs/cmake\"
            # Nix環境特有の警告を抑制
            filter_cmd=\"grep -v 'doesn.t contain any .local_setup... files' || true\"

            # 2. ジェネレーター単体をビルド (forge-bindings相当)
            colcon build \
              --packages-up-to rosidl_generator_rs \
              --merge-install --symlink-install \
              --cmake-args -G Ninja -DBUILD_TESTING=OFF

            # 3. 依存パスを強制エクスポートした状態で全体をビルド (forge相当)
            export AMENT_PREFIX_PATH=\"\$install_dir\${AMENT_PREFIX_PATH:+:\$AMENT_PREFIX_PATH}\"
            export PYTHONPATH=\"\$py_path\${PYTHONPATH:+:\$PYTHONPATH}\"
            export PATH=\"\$install_dir/lib/rosidl_generator_rs:\$PATH\"

            colcon build \
              --merge-install --symlink-install \
              --cmake-args \
                -DROSIDL_GENERATOR_RUST=ON \
                -Drosidl_generator_rs_DIR=\"\$gen_cmake\" \
                -DBUILD_TESTING=OFF \
                -G Ninja \
              --packages-ignore kiss_icp h264_republisher vision_processor
            source install/setup.bash
            export PATH=\"\$(pwd)/install/lib/rosidl_generator_rs:\$PATH\"
            cargo test --workspace
          "

      - name: Python integration tests
        run: |
          nix develop .#ci --fallback --accept-flake-config --command bash -euo pipefail -c "
            cd main_ws
            if compgen -G 'test_*.py' > /dev/null; then
              python3 -m pytest -q -k integration
            else
              echo 'integration tests なし: スキップ'
            fi
          "
